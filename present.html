<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>進行用｜Reegle ジラフユニット 商談</title>
<style>/* ==========================================================
   Reegle Giraffe Sales Presentation - Styles
   Design tokens: matches existing Reegle deck (greens / BIZ UDPGothic)
   ========================================================== */

:root {
  --green-dk: #1E5530;
  --green: #2A6E3A;
  --green-lt: #EAF3EC;
  --ink: #333333;
  --sub: #5F6B62;
  --box: #F5F7FA;
  --line: #E2E6E9;
  --white: #FFFFFF;
  --font-jp: 'BIZ UDPGothic', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', 'Meiryo', sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; font-family: var(--font-jp); color: var(--ink); -webkit-font-smoothing: antialiased; }

/* ----- Slide canvas: 16:9, scales to fit container ----- */
.slide {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: var(--white);
  overflow: hidden;
  container-type: inline-size;
}
.slide-inner {
  position: absolute; inset: 0;
  padding: 3.5cqw 4cqw 5cqw 4cqw;
  display: flex; flex-direction: column;
}

/* ----- Slide header (eyebrow + rule + title) ----- */
.slide-header {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 1.4cqw; color: var(--green-dk); font-weight: bold;
}
.shared-tag {
  font-size: 1cqw; color: var(--sub); font-weight: normal;
  border: 1px solid var(--line); padding: 0.2cqw 0.6cqw; border-radius: 0.3cqw;
}
.slide-rule { height: 0; border-top: 0.15cqw solid var(--green-dk); margin: 0.6cqw 0 1.0cqw; }
.slide-title { font-size: 2.6cqw; font-weight: bold; color: var(--green-dk); margin: 0 0 1.5cqw; line-height: 1.3; }
.slide-eyebrow { font-size: 1.4cqw; color: var(--green-dk); font-weight: bold; }

/* ----- Slide footer ----- */
.slide-footer {
  position: absolute; bottom: 1.2cqw; left: 4cqw; right: 4cqw;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 1.1cqw; color: var(--sub);
  padding-top: 0.6cqw; border-top: 0.08cqw solid var(--line);
}

/* ============================================================
   Slide kinds
   ============================================================ */

/* ----- Cover ----- */
.slide-cover .slide-inner { padding: 0; }
.cover-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--green-dk) 0%, var(--green) 60%, #3a8848 100%);
}
.cover-bg::before {
  content: ""; position: absolute; right: -10%; bottom: -10%; width: 70%; height: 70%;
  background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
}
.cover-content {
  position: relative; z-index: 1; padding: 6cqw 6cqw;
  height: 100%; display: flex; flex-direction: column; justify-content: center;
  color: var(--white);
}
.cover-eyebrow { font-size: 1.6cqw; opacity: 0.85; margin-bottom: 1cqw; letter-spacing: 0.05em; }
.cover-title { font-size: 4.2cqw; font-weight: bold; line-height: 1.35; margin: 0 0 2cqw; }
.cover-subtitle { font-size: 1.8cqw; opacity: 0.9; margin-bottom: auto; }
.cover-company { font-size: 1.4cqw; opacity: 0.75; }

/* ----- Bullets layout (intro / position / basic / closing) ----- */
.bullets { display: flex; flex-direction: column; gap: 1.2cqw; flex: 1; }
.bullet-card {
  background: var(--box); border-radius: 0.5cqw; padding: 1.4cqw 1.8cqw;
  border-left: 0.4cqw solid var(--green-dk);
}
.bullet-h { font-size: 1.7cqw; font-weight: bold; color: var(--green-dk); margin-bottom: 0.3cqw; }
.bullet-d { font-size: 1.4cqw; color: var(--ink); line-height: 1.5; }

/* ----- Overview (image + structured text) ----- */
.overview-grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 2cqw; flex: 1; align-items: start; }
.overview-img { background: var(--box); border-radius: 0.5cqw; overflow: hidden; aspect-ratio: 4/3; }
.overview-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.overview-text { display: flex; flex-direction: column; gap: 0.8cqw; }
.overview-sub { font-size: 1.5cqw; color: var(--green); font-weight: bold; margin-bottom: 0.4cqw; }
.bullet-row {
  padding: 0.8cqw 1.2cqw; background: var(--green-lt); border-radius: 0.4cqw;
}
.bullet-row-h { font-size: 1.4cqw; font-weight: bold; color: var(--green-dk); }
.bullet-row-d { font-size: 1.2cqw; color: var(--ink); margin-top: 0.2cqw; }
.overview-foot { font-size: 1.1cqw; color: var(--sub); margin-top: 0.4cqw; }

/* ----- USP merits ----- */
.merits { display: flex; flex-direction: column; gap: 1cqw; flex: 1; }
.merit-card {
  display: flex; align-items: center; gap: 1.5cqw;
  background: var(--box); border-radius: 0.5cqw; padding: 1.3cqw 1.8cqw;
}
.merit-num {
  width: 3.2cqw; height: 3.2cqw; border-radius: 50%; background: var(--green-dk);
  color: var(--white); font-size: 1.6cqw; font-weight: bold;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.merit-body { flex: 1; }
.merit-h { font-size: 1.7cqw; font-weight: bold; color: var(--green-dk); margin-bottom: 0.2cqw; }
.merit-d { font-size: 1.4cqw; color: var(--ink); }
.merit-bar {
  margin-top: 1cqw; padding: 1.1cqw 2cqw; background: var(--green-dk);
  color: var(--white); border-radius: 0.4cqw; text-align: center;
  font-size: 1.6cqw; font-weight: bold;
}

/* ----- Questions ----- */
.questions { display: flex; flex-direction: column; gap: 0.9cqw; flex: 1; }
.question-item {
  display: flex; gap: 1.2cqw; align-items: start;
  padding: 1.1cqw 1.5cqw; background: var(--box); border-radius: 0.4cqw;
  border-left: 0.4cqw solid var(--green);
}
.question-mark {
  font-size: 1.3cqw; font-weight: bold; color: var(--green-dk);
  background: var(--green-lt); padding: 0.2cqw 0.7cqw; border-radius: 0.3cqw;
  flex-shrink: 0;
}
.question-text { font-size: 1.5cqw; color: var(--ink); line-height: 1.4; padding-top: 0.2cqw; }

/* ----- Achievement ----- */
.achievement-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 2cqw; flex: 1; align-items: start; }
.achievement-img { background: var(--box); border-radius: 0.5cqw; overflow: hidden; aspect-ratio: 4/3; }
.achievement-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.achievement-text { display: flex; flex-direction: column; gap: 1cqw; }
.ach-row {
  padding: 1cqw 1.4cqw; background: var(--green-lt); border-radius: 0.4cqw;
  border-left: 0.4cqw solid var(--green-dk);
}
.ach-h { font-size: 1.5cqw; font-weight: bold; color: var(--green-dk); }
.ach-d { font-size: 1.2cqw; color: var(--ink); margin-top: 0.2cqw; }
.ach-foot { font-size: 1.1cqw; color: var(--sub); margin-top: 0.4cqw; }

/* ----- Q&A grid ----- */
.qa-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.8cqw; flex: 1;
  align-content: start;
}
.qa-card {
  background: var(--box); border-radius: 0.4cqw; padding: 0.9cqw 1.2cqw;
  border-left: 0.3cqw solid var(--green);
}
.qa-q { font-size: 1.15cqw; font-weight: bold; color: var(--green-dk); margin-bottom: 0.25cqw; line-height: 1.35; }
.qa-a { font-size: 1.05cqw; color: var(--ink); line-height: 1.4; }

/* ----- Simple ----- */
.simple-body {
  flex: 1; display: flex; align-items: center; justify-content: center;
  font-size: 2cqw; color: var(--green-dk); text-align: center;
  background: var(--green-lt); border-radius: 0.5cqw; padding: 2cqw;
}

/* ----- Rebuttal ----- */
.rebuttal-grid { display: flex; flex-direction: column; gap: 1.2cqw; flex: 1; }
.rebuttal-card {
  padding: 1.4cqw 1.8cqw; background: var(--box); border-radius: 0.5cqw;
  border-left: 0.4cqw solid var(--green-dk);
}
.rebuttal-h { font-size: 1.6cqw; font-weight: bold; color: var(--green-dk); margin-bottom: 0.5cqw; }
.rebuttal-d { font-size: 1.35cqw; color: var(--ink); line-height: 1.5; }

/* ----- Empty/error ----- */
.slide-empty { padding: 8cqw; color: var(--sub); text-align: center; font-size: 2cqw; }
</style>
<style>
/* Presenter-specific layout */
html, body { height: 100%; background: #f6f7f8; overflow: hidden; }
.app {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
}

/* Top bar: type switcher + global controls */
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 10px 20px; background: var(--white);
  border-bottom: 1px solid var(--line);
  font-family: var(--font-jp);
}
.brand { font-weight: bold; color: var(--green-dk); font-size: 15px; margin-right: 12px; }
.type-switcher { display: flex; gap: 6px; }
.type-btn {
  padding: 7px 14px; font-size: 13px; font-family: var(--font-jp);
  border: 1px solid var(--line); border-radius: 6px;
  background: var(--white); color: var(--ink); cursor: pointer;
  transition: all 0.15s;
}
.type-btn:hover { background: var(--green-lt); }
.type-btn.active {
  background: var(--green-dk); color: var(--white); border-color: var(--green-dk); font-weight: bold;
}
.spacer { flex: 1; }
.sync-status {
  font-size: 12px; padding: 4px 10px; border-radius: 4px;
  background: #f0f0f0; color: var(--sub);
}
.sync-status.live { background: #e8f5e9; color: #1b5e20; }
.btn-projector {
  padding: 8px 14px; font-size: 13px; font-family: var(--font-jp);
  background: var(--green-dk); color: var(--white);
  border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
}
.btn-projector:hover { background: var(--green); }

/* Main two-pane layout */
.main {
  display: grid;
  grid-template-columns: 1fr 1.5fr;
  gap: 16px;
  padding: 16px;
  overflow: hidden;
}

/* Left: script list */
.script-pane {
  background: var(--white); border-radius: 8px; border: 1px solid var(--line);
  overflow-y: auto; padding: 12px;
}
.script-block {
  padding: 12px 14px; margin-bottom: 8px; border-radius: 6px;
  border: 1px solid transparent; cursor: pointer;
  transition: all 0.15s;
}
.script-block:hover { background: var(--green-lt); }
.script-block.active {
  background: #fff8e1; border-color: #f9c948; box-shadow: 0 0 0 2px rgba(249,201,72,0.2);
}
.script-section-tag {
  display: inline-block; padding: 2px 8px; font-size: 11px; font-weight: bold;
  background: var(--green-lt); color: var(--green-dk); border-radius: 3px;
  margin-right: 8px;
}
.script-shared-tag {
  display: inline-block; padding: 2px 6px; font-size: 10px;
  background: #f0f0f0; color: var(--sub); border-radius: 3px;
}
.script-num { font-size: 11px; color: var(--sub); margin-right: 6px; }
.script-title { display: inline; font-size: 13px; font-weight: bold; color: var(--ink); }
.script-body {
  margin-top: 8px; font-size: 13px; line-height: 1.65; color: var(--ink);
  white-space: pre-wrap;
}
.script-body p { margin: 0 0 0.5em; }
.script-body strong { color: var(--green-dk); }
.script-body h3, .script-body .sub-h {
  font-size: 12px; font-weight: bold; color: var(--green-dk);
  margin: 0.8em 0 0.3em; border-left: 2px solid var(--green); padding-left: 6px;
}

/* Right: slide preview + controls */
.preview-pane { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
.preview-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--sub);
}
.preview-meta .meta-strong { color: var(--ink); font-weight: bold; }
.preview-wrap {
  background: var(--white); border-radius: 8px; border: 1px solid var(--line);
  padding: 10px; flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.preview-slide { width: 100%; max-width: 100%; max-height: 100%; aspect-ratio: 16/9; }
.preview-slide .slide { width: 100%; height: 100%; aspect-ratio: auto; }

/* Nav controls */
.nav-controls { display: flex; gap: 8px; align-items: center; }
.nav-btn {
  padding: 6px 12px; font-size: 12px; font-family: var(--font-jp);
  background: var(--white); color: var(--ink);
  border: 1px solid var(--line); border-radius: 5px; cursor: pointer;
}
.nav-btn:hover { background: var(--green-lt); border-color: var(--green); }
.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.nav-counter { font-size: 12px; color: var(--sub); padding: 0 6px; }

/* Keyboard hint */
.kb-hint { font-size: 11px; color: var(--sub); opacity: 0.7; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">Reegle ジラフユニット 商談</div>
    <div class="type-switcher" id="typeSwitcher"></div>
    <div class="spacer"></div>
    <div class="kb-hint">← → でスライド送り</div>
    <div class="sync-status" id="syncStatus">投影画面：未接続</div>
    <button class="btn-projector" id="btnProjector">🖥 投影画面を別タブで開く</button>
  </div>

  <div class="main">

    <div class="script-pane" id="scriptPane"></div>

    <div class="preview-pane">
      <div class="preview-meta">
        <span id="metaSection" class="meta-strong"></span>
        <span id="metaPage"></span>
        <div style="flex:1"></div>
        <div class="nav-controls">
          <button class="nav-btn" id="btnPrev">← 前へ</button>
          <span class="nav-counter" id="navCounter"></span>
          <button class="nav-btn" id="btnNext">次へ →</button>
        </div>
      </div>
      <div class="preview-wrap"><div class="preview-slide" id="previewSlide"></div></div>
    </div>

  </div>

があるポイントを3つにまとめますね。\n\n一つ目は、設計負荷の軽減です。\n 規格化されたフレームをベースにするため、ゼロから構造を組む必要がなく、非住宅案件でもスムーズに着手できます。\n\n二つ目は、短工期・ローコストです。\n 部材が標準化されているため、材料手配や施工の段取りが組みやすく、結果として工期短縮やコスト抑制につながります。\n\n最後に、用途の幅広さです。\n 倉庫・作業場・店舗・ガレージなど、用途を限定せずに提案できるため、御社の商談機会を広げるきっかけにもなります。\n\n# **【基本サービス】**\n\n弊社では、コレモクのフレーム提供に加えて、御社の案件内容を伺いながら、どの規格が適しているか、どのような構成が現実的かを一緒に整理するところまでサポートしています。\n\nいきなり導入を前提にするのではなく、「こういう案件なら使えそうか」「ここは難しそうか」といった整理の段階からお話しできればと考えています。\n\n# **【実績紹介】**\n\n本格導入はこれからの段階ではありますが、施工会社様からの相談や、非住宅木造の検討案件において、「鉄骨ほど大げさにしたくない」「プレハブより意匠性を出したい」といった声をいただいています。\n\nその中で、特に「小規模建築の選択肢が増える」という点で、具体的な評価やフィードバックもいただいています。\n\n# **【ヒアリング（提案）】**\n\nすいません、ここまで一方的にお話ししてしまいました。ここからは御社の現状や、今日お聞きいただいた内容の中で「ここが気になる」「少し深掘りしたい」と感じられた部分を伺えればと思っています。\n ありがとうございます。\n\n## **先方の取り組み・課題について**\n\nでは、現在の体制で特に改善したい点や課題を感じていらっしゃる部分をお聞かせください。\n\n非住宅木造の案件で、構造やコスト面で課題を感じる場面はありますか。\n\n小規模建築の相談があった際、提案の幅に制約を感じることはありますか。\n\n工期や材料手配で、改善したい点はありますか。\n\n御社の得意分野と、今後広げたい領域があれば教えてください。\n\n## **BANT情報の確認**\n\n実現可能な進め方を設計するため、差し支えない範囲で確認させてください。\n\n今回のような建築フレーム導入について、最終的な判断はどなたが中心になることが多いでしょうか。\n\n導入を検討される場合、時期としてはどれくらいを想定されていますか。\n\n対象となる案件の規模感や用途はどれくらいでしょうか。\n\n検討を進める際に、設計部門や他部署との調整が必要になるケースはありますか。\n\n# **【想定される先方からの質疑＆その応答】**\n\nQ1：どんな用途に使えますか。\n A1：倉庫・作業場・店舗・ガレージ・小規模事務所など、幅広い用途に対応できます。規格化されたフレームなので、用途に合わせて柔軟にご提案できます。\n\nQ2：構造の強度は問題ありませんか。\n A2：必要な強度を確保したうえで規格化しているため、一般的な小規模非住宅用途であれば問題なく対応できます。\n\nQ3：設計の自由度はどれくらいありますか。\n A3：規格フレームをベースにしつつ、間取りや外観は案件に合わせて調整できます。完全自由設計より負荷を抑えながら、一定の自由度を確保できます。\n\nQ4：工期はどれくらい短縮できますか。\n A4：部材が標準化されているため、材料手配や施工の段取りが組みやすく、結果として短工期につながります。\n\nQ5：木材の劣化は心配ありませんか。\n A5：屋内・屋根下での使用を前提にしているため、一般的な木造建築と同様の扱いになります。木材特有の細かな割れが入る可能性はありますが、構造上の問題にはなりません。\n\nQ6：金物固定の仕様にはできますか。\n A6：金物固定については、過去に検討したことがあります。安全性や耐久性が上がる一方で、部材点数が増えてコストが上がることや、コンセプトを崩してしまうため、現在の提供仕様としては採用していません。ただ、検討の背景については丁寧にご説明できます。\n\nQ7：対応エリアはどこまでですか。\n A7：地域によって材料供給の条件が異なるため、まずは案件の場所を伺いながら、対応可否を確認させていただいています。\n\nQ8：価格はいくらぐらいになりますか。\n A8：規模や用途によって大きく変わるため、まずは案件の条件を伺ったうえで、次回の商談時に具体的な構成案とあわせてお見積りをご用意できます。\n\n# **【クロージング】**\n\nありがとうございます。\n もしよろしければ、まずは御社の体制やご希望を伺いながら、最適なプランを具体化させていただければと思っています。\n\nたとえば「〇月〇日（〇曜日）」か「〇月〇日（〇曜日）」にお時間いただくことは可能でしょうか。\n ご都合のよろしい方をお聞かせいただけると助かります。\n\n# **【次回商談の日程決め】**\n\nありがとうございます。\n お時間は午前と午後はどちらがご都合よろしいでしょうか。\n\nありがとうございます。\n ●時と●時ではどちらがよろしいでしょうか。\n\nありがとうございます。\n では、●月●日の●時でお時間を頂戴できればと思いますのでよろしくお願いいたします。\n\n本日、私の方からのご案内は以上となりますが、何かご不明点はございますか。\n （回答不可の場合は次回回答を案内）\n\n本日はありがとうございました。\n\n# **【クロージング後の切り返し】**\n\n## **検討したいと言われた場合**\n\nありがとうございます。\n 先ほどのお話と重なりますが、判断材料を揃える意味でも、一度御社の案件に合わせた具体的な構成案をご覧いただく方が整理しやすいかと思います。\n 三十分ほどお時間をいただければ、御社の状況に合わせた内容をご用意できますので、軽い情報整理の場としてお時間いただければと思っています。\n\n## **見送りたいと言われた場合**\n\n率直にお話しいただきありがとうございます。\n 御社の状況を踏まえると、今は優先度が高くないというご判断は理解いたしました。ただ、小規模建築の相談は急に発生することも多いため、次回は御社の業務に当てはめた具体例をご用意できますので、情報整理の場として三十分ほどお時間をいただければと思います。\n\n## **会社の確認が必要と言われた場合**\n\n承知いたしました。\n 確認を進めていただくうえでも、概要と構成イメージをまとめた資料があると共有しやすいかと思います。\n 先ほど触れた内容を御社向けに整理した資料をご用意しますので、確認後の状況を伺う形で三十分ほどお時間いただければと思います。"}};</script>
<script>/* ==========================================================
   Reegle Giraffe Sales Presentation - Renderer
   Used by both index.html (audience) and present.html (presenter)
   ========================================================== */

// SLIDES_DATA, SCRIPTS_DATA, IMAGES will be defined by the host HTML before this script loads.

// ----- Type metadata -----
const TYPE_META = {
  municipal: { label: '自治体向け', color: '#1E5530' },
  kindergarten: { label: '幼稚園向け', color: '#2A6E3A' },
  studio: { label: '写真スタジオ向け', color: '#1E5530' },
};

const SECTION_LABELS = {
  cover: '表紙',
  intro: '会社紹介',
  icebreak: 'アイスブレイク',
  overview: 'サービス概要',
  position: '関心・ポジショニング',
  usp: '3つのメリット',
  basic: '基本サービス',
  achievement: '実績紹介',
  hearing: 'ヒアリング',
  qa: '想定Q&A',
  closing: 'クロージング',
  next: '次回日程',
  rebuttal: '切り返し',
};

// ----- Resolve image references -----
function resolveImage(ref) {
  if (!ref || !ref.startsWith('img:')) return null;
  const key = ref.slice(4);
  return (typeof IMAGES !== 'undefined' && IMAGES[key]) || null;
}

// ----- Render a single slide into the given container -----
function renderSlide(container, slide, opts = {}) {
  if (!slide) {
    container.innerHTML = '<div class="slide-empty">スライドがありません</div>';
    return;
  }
  const kind = slide.kind;
  container.innerHTML = '';
  container.className = 'slide slide-' + kind;
  const inner = document.createElement('div');
  inner.className = 'slide-inner';

  // Cover slide
  if (kind === 'cover') {
    inner.innerHTML = `
      <div class="cover-bg"></div>
      <div class="cover-content">
        <div class="cover-eyebrow">${esc(slide.eyebrow)}</div>
        <h1 class="cover-title">${nl2br(esc(slide.title))}</h1>
        <div class="cover-subtitle">${esc(slide.subtitle || '')}</div>
        <div class="cover-company">${esc(slide.company || '')}</div>
      </div>
    `;
  }
  // Intro / position / basic / closing (bullets layout)
  else if (kind === 'intro' || kind === 'position' || kind === 'basic' || kind === 'closing') {
    inner.innerHTML = `
      ${headerHTML(slide)}
      <div class="bullets">
        ${(slide.bullets || []).map(b => `
          <div class="bullet-card">
            <div class="bullet-h">${esc(b.h)}</div>
            ${b.d ? `<div class="bullet-d">${esc(b.d)}</div>` : ''}
          </div>
        `).join('')}
      </div>
    `;
  }
  // Overview - product image + bullets
  else if (kind === 'overview') {
    const img = resolveImage(slide.image);
    inner.innerHTML = `
      ${headerHTML(slide)}
      <div class="overview-grid">
        <div class="overview-img">${img ? `<img src="${img}" alt="">` : ''}</div>
        <div class="overview-text">
          <div class="overview-sub">${esc(slide.subtitle || '')}</div>
          ${(slide.bullets || []).map(b => `
            <div class="bullet-row">
              <div class="bullet-row-h">${esc(b.h)}</div>
              <div class="bullet-row-d">${esc(b.d)}</div>
            </div>
          `).join('')}
          ${slide.footnote ? `<div class="overview-foot">※ ${esc(slide.footnote)}</div>` : ''}
        </div>
      </div>
    `;
  }
  // USP - 3 merits + green bar
  else if (kind === 'usp') {
    inner.innerHTML = `
      ${headerHTML(slide)}
      <div class="merits">
        ${(slide.merits || []).map(m => `
          <div class="merit-card">
            <div class="merit-num">${esc(m.n)}</div>
            <div class="merit-body">
              <div class="merit-h">${esc(m.h)}</div>
              <div class="merit-d">${esc(m.d)}</div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="merit-bar">${esc(slide.bar)}</div>
    `;
  }
  // Questions (icebreak / hearing)
  else if (kind === 'questions') {
    inner.innerHTML = `
      ${headerHTML(slide)}
      <div class="questions">
        ${(slide.questions || []).map((q, i) => `
          <div class="question-item">
            <span class="question-mark">Q${i + 1}</span>
            <span class="question-text">${esc(q)}</span>
          </div>
        `).join('')}
      </div>
    `;
  }
  // Achievement - image + bullets
  else if (kind === 'achievement') {
    const img = resolveImage(slide.image);
    inner.innerHTML = `
      ${headerHTML(slide)}
      <div class="achievement-grid">
        <div class="achievement-img">${img ? `<img src="${img}" alt="">` : ''}</div>
        <div class="achievement-text">
          ${(slide.bullets || []).map(b => `
            <div class="ach-row">
              <div class="ach-h">${esc(b.h)}</div>
              ${b.d ? `<div class="ach-d">${esc(b.d)}</div>` : ''}
            </div>
          `).join('')}
          ${slide.footnote ? `<div class="ach-foot">※ ${esc(slide.footnote)}</div>` : ''}
        </div>
      </div>
    `;
  }
  // Q&A grid
  else if (kind === 'qa') {
    inner.innerHTML = `
      ${headerHTML(slide)}
      <div class="qa-grid">
        ${(slide.items || []).map(it => `
          <div class="qa-card">
            <div class="qa-q">Q. ${esc(it.q)}</div>
            <div class="qa-a">A. ${esc(it.a)}</div>
          </div>
        `).join('')}
      </div>
    `;
  }
  // Simple text
  else if (kind === 'simple') {
    inner.innerHTML = `
      ${headerHTML(slide)}
      <div class="simple-body">${esc(slide.body)}</div>
    `;
  }
  // Rebuttal cases
  else if (kind === 'rebuttal') {
    inner.innerHTML = `
      ${headerHTML(slide)}
      <div class="rebuttal-grid">
        ${(slide.cases || []).map(c => `
          <div class="rebuttal-card">
            <div class="rebuttal-h">${esc(c.h)}</div>
            <div class="rebuttal-d">${esc(c.d)}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  // Footer (except cover)
  if (kind !== 'cover') {
    const footer = document.createElement('div');
    footer.className = 'slide-footer';
    const typeLabel = opts.typeLabel || '';
    const pageInfo = opts.pageInfo || '';
    footer.innerHTML = `
      <div class="footer-left">Reegle株式会社${typeLabel ? ' ／ ' + esc(typeLabel) : ''}</div>
      <div class="footer-right">${esc(pageInfo)}</div>
    `;
    inner.appendChild(footer);
  }

  container.appendChild(inner);
}

// ----- Helpers -----
function headerHTML(slide) {
  return `
    <div class="slide-header">
      <div class="slide-eyebrow">${esc(slide.eyebrow || '')}</div>
      ${slide._shared ? '<div class="shared-tag">共通</div>' : ''}
    </div>
    <div class="slide-rule"></div>
    <h2 class="slide-title">${nl2br(esc(slide.title || ''))}</h2>
  `;
}
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function nl2br(s) { return s.replace(/\n/g, '<br>'); }
</script>

<script>
// ===== Presenter state =====
const state = {
  type: 'municipal',
  index: 0,
};

// ===== BroadcastChannel setup =====
let bc = null;
let audienceConnected = false;
try {
  bc = new BroadcastChannel('reegle-present');
  bc.onmessage = ev => {
    if (!ev.data) return;
    if (ev.data.kind === 'hello') {
      // Audience tab announced itself — respond with current state and mark connected
      audienceConnected = true;
      updateSyncStatus();
      sendState('hello-back');
    } else if (ev.data.kind === 'nav') {
      navigate(ev.data.dir);
    }
  };
} catch {}

function sendState(kind = 'state') {
  if (!bc) return;
  bc.postMessage({ kind, state: { type: state.type, index: state.index } });
}
function updateSyncStatus() {
  const el = document.getElementById('syncStatus');
  if (audienceConnected) {
    el.textContent = '投影画面：接続中';
    el.classList.add('live');
  } else {
    el.textContent = '投影画面：未接続';
    el.classList.remove('live');
  }
}

// ===== Type switcher =====
function renderTypeSwitcher() {
  const host = document.getElementById('typeSwitcher');
  host.innerHTML = '';
  Object.keys(TYPE_META).forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'type-btn' + (t === state.type ? ' active' : '');
    btn.textContent = TYPE_META[t].label;
    btn.onclick = () => switchType(t);
    host.appendChild(btn);
  });
}
function switchType(t) {
  state.type = t;
  state.index = 0;
  renderTypeSwitcher();
  renderScriptList();
  paintPreview();
  scrollActiveIntoView();
  sendState();
}

// ===== Script formatting =====
function formatScript(raw) {
  if (!raw) return '';
  // Convert markdown-ish patterns to HTML
  // 1. Sub-headings (## **Q1：...**)
  let s = raw.replace(/^##\s*\*\*(.+?)\*\*\s*$/gm, '<div class="sub-h">$1</div>');
  // 2. Bold (**xxx**)
  s = s.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
  // 3. Bullet lines starting with "- "
  s = s.replace(/^- (.+)$/gm, '・$1');
  // 4. Paragraphs (split by blank line)
  const paragraphs = s.split(/\n\n+/).map(p => {
    if (p.includes('class="sub-h"')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  });
  return paragraphs.join('');
}

// ===== Script list =====
function renderScriptList() {
  const pane = document.getElementById('scriptPane');
  pane.innerHTML = '';
  const slides = SLIDES_DATA[state.type] || [];
  const scripts = SCRIPTS_DATA[state.type] || {};
  slides.forEach((slide, i) => {
    const block = document.createElement('div');
    block.className = 'script-block' + (i === state.index ? ' active' : '');
    block.dataset.idx = i;
    const sec = slide._section;
    const sectionLabel = SECTION_LABELS[sec] || sec;
    const scriptText = scripts[sec] || '';
    const shared = slide._shared ? '<span class="script-shared-tag">共通</span>' : '';
    const header = `
      <div>
        <span class="script-num">${String(i+1).padStart(2,'0')}</span>
        <span class="script-section-tag">${escHtml(sectionLabel)}</span>
        ${shared}
      </div>
    `;
    const body = scriptText ? `<div class="script-body">${formatScript(scriptText)}</div>` : '';
    block.innerHTML = header + body;
    block.onclick = () => { state.index = i; paintPreview(); scrollActiveIntoView(); sendState(); markActive(); };
    pane.appendChild(block);
  });
}
function markActive() {
  document.querySelectorAll('.script-block').forEach((b, i) => {
    b.classList.toggle('active', i === state.index);
  });
}
function scrollActiveIntoView() {
  const active = document.querySelector('.script-block.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===== Preview =====
function paintPreview() {
  const slides = SLIDES_DATA[state.type] || [];
  const slide = slides[state.index];
  const host = document.getElementById('previewSlide');
  const nonCoverIdx = slides.slice(0, state.index + 1).filter(s => s.kind !== 'cover').length;
  const nonCoverTotal = slides.filter(s => s.kind !== 'cover').length;
  const typeLabel = TYPE_META[state.type] ? TYPE_META[state.type].label : '';
  const pageInfo = slide && slide.kind !== 'cover' ? `${nonCoverIdx} / ${nonCoverTotal}` : '';
  renderSlide(host, slide, { typeLabel, pageInfo });
  // Meta info
  document.getElementById('metaSection').textContent = SECTION_LABELS[slide._section] || '';
  document.getElementById('metaPage').textContent = `${state.index + 1} / ${slides.length}`;
  document.getElementById('navCounter').textContent = `${state.index + 1} / ${slides.length}`;
  document.getElementById('btnPrev').disabled = state.index === 0;
  document.getElementById('btnNext').disabled = state.index === slides.length - 1;
}

// ===== Navigation =====
function navigate(dir) {
  const slides = SLIDES_DATA[state.type] || [];
  const next = state.index + dir;
  if (next < 0 || next >= slides.length) return;
  state.index = next;
  paintPreview();
  scrollActiveIntoView();
  markActive();
  sendState();
}

// ===== Wiring =====
document.getElementById('btnPrev').onclick = () => navigate(-1);
document.getElementById('btnNext').onclick = () => navigate(1);
document.getElementById('btnProjector').onclick = () => {
  // Open audience view in a new tab; user then shares THAT tab in Zoom
  const win = window.open('index.html', 'reegle-audience');
  if (!win) {
    alert('ポップアップがブロックされました。ブラウザの設定で許可してください。');
    return;
  }
  // Optimistic: mark as soon-to-connect
  setTimeout(() => { sendState(); }, 700);
};
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight') { navigate(1); e.preventDefault(); }
  else if (e.key === 'ArrowLeft') { navigate(-1); e.preventDefault(); }
});

function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ===== Init =====
renderTypeSwitcher();
renderScriptList();
paintPreview();
updateSyncStatus();
</script>
</body>
</html>
