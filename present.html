<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>進行用｜Reegle ジラフユニット 商談</title>
<style>/* ==========================================================
   Reegle Giraffe v4 "Lacquer & Vermillion / 漆と朱"
   Editorial Pro — bold typography, vermillion accent, full-bleed photos
   ========================================================== */

@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700;900&family=BIZ+UDPGothic:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Bodoni+Moda:ital,wght@0,400;0,500;0,700;1,400&display=swap');

:root {
  /* Greens - primary brand */
  --green-dk: #1A4A2A;
  --green: #2A6E3A;
  --green-soft: #4A7F5C;
  --green-lt: #E8F0E8;

  /* Wood / earth */
  --wood: #B89968;
  --wood-dk: #8E7449;
  --wood-lt: #D9C7A5;

  /* NEW: Vermillion / 朱 — accent for pop */
  --vermillion: #C8492C;
  --vermillion-dk: #9E3621;
  --vermillion-soft: #E8A793;

  /* Deep ink / black accents */
  --black: #0E0E0D;
  --charcoal: #2C2825;

  /* Cream / paper */
  --cream: #FAF7F1;
  --cream-2: #F0E9DD;
  --paper: #F5F1E8;

  --ink: #1A1A1A;
  --ink-soft: #3A3A35;
  --sub: #6B6B65;
  --hairline: #DDD6C7;
  --hairline-dk: #B8AE99;

  --font-jp: 'BIZ UDPGothic', 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
  --font-serif: 'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  --font-display: 'Bodoni Moda', 'Cormorant Garamond', 'Noto Serif JP', serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; font-family: var(--font-jp); color: var(--ink); -webkit-font-smoothing: antialiased; background: var(--cream); }

/* ============ Slide canvas ============ */
.slide {
  position: relative; width: 100%; aspect-ratio: 16 / 9;
  background: var(--cream); overflow: hidden;
  container-type: inline-size; font-family: var(--font-jp);
}
.slide-inner {
  position: absolute; inset: 0;
  padding: 3.2cqw 4.5cqw 4cqw;
  display: flex; flex-direction: column;
}

/* ============ Chapter mark (new) ============ */
.chapter-mark {
  position: absolute; top: 3cqw; right: 4.5cqw;
  font-family: var(--font-display); font-style: italic;
  font-size: 6cqw; font-weight: 400;
  color: var(--vermillion); opacity: 0.18;
  line-height: 1; letter-spacing: -0.02em;
  pointer-events: none;
  z-index: 0;
}

/* ============ Standard header ============ */
.slide-header {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.95cqw; letter-spacing: 0.2em; margin-bottom: 0.8cqw;
  position: relative; z-index: 1;
}
.slide-eyebrow {
  text-transform: uppercase; color: var(--vermillion);
  font-weight: 700; display: flex; align-items: center; gap: 0.7cqw;
}
.slide-eyebrow::before {
  content: ""; width: 2cqw; height: 1px; background: var(--vermillion);
}
.shared-tag {
  font-size: 0.85cqw; color: var(--sub); font-weight: 400;
  text-transform: none; letter-spacing: 0.05em;
  padding: 0.2cqw 0.7cqw; border: 1px solid var(--hairline); border-radius: 999px;
}
.slide-title {
  font-family: var(--font-serif);
  font-size: 3.4cqw; font-weight: 700;
  color: var(--green-dk); letter-spacing: 0.01em;
  line-height: 1.35; margin: 0.2cqw 0 1.5cqw;
  position: relative; z-index: 1;
}

/* ============ Footer ============ */
.slide-footer {
  position: absolute; bottom: 1.5cqw; left: 4.5cqw; right: 4.5cqw;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.85cqw; color: var(--sub); letter-spacing: 0.1em;
  padding-top: 0.6cqw; border-top: 1px solid var(--hairline);
}
.footer-left {
  font-family: var(--font-display); font-weight: 700;
  color: var(--green-dk); letter-spacing: 0.3em; font-size: 1cqw;
}
.footer-right { font-size: 0.85cqw; color: var(--sub); letter-spacing: 0.1em; }

/* ==========================================================
   COVER — full-bleed photo + huge typography + vermillion accent
   ========================================================== */
.slide-cover .slide-inner { padding: 0; }
.cover-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  filter: contrast(1.05);
}
.cover-bg::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(110deg, rgba(10,30,18,0.85) 0%, rgba(15,40,22,0.65) 45%, rgba(20,55,32,0.25) 100%);
}
.cover-content {
  position: relative; z-index: 1;
  padding: 4.5cqw 5cqw 4cqw; height: 100%;
  display: flex; flex-direction: column; justify-content: space-between;
  color: var(--cream);
}
.cover-top {
  display: flex; align-items: center; gap: 1.2cqw;
  font-size: 1.0cqw; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--vermillion-soft);
  font-weight: 700;
}
.cover-top::before { content: ""; width: 3.5cqw; height: 1.5px; background: var(--vermillion); }
.cover-title-block { display: flex; flex-direction: column; gap: 1.5cqw; }
.cover-chapter {
  font-family: var(--font-display); font-style: italic;
  font-size: 2.2cqw; font-weight: 500; color: var(--vermillion-soft);
  letter-spacing: 0.05em; line-height: 1;
}
.cover-title {
  font-family: var(--font-serif);
  font-size: 4.8cqw; font-weight: 700;
  line-height: 1.35; letter-spacing: 0.01em;
  margin: 0; max-width: 85%;
  text-shadow: 0 2px 20px rgba(0,0,0,0.2);
}
.cover-subtitle {
  font-size: 1.4cqw; letter-spacing: 0.1em;
  margin-top: 0.5cqw; opacity: 0.95;
}
.cover-bottom { display: flex; align-items: flex-end; justify-content: space-between; }
.cover-brand {
  font-family: var(--font-display); font-weight: 700;
  letter-spacing: 0.4em; font-size: 1.5cqw;
}
.cover-brand::before { content: "—  "; color: var(--vermillion-soft); }
.cover-brand-sub {
  font-size: 0.85cqw; letter-spacing: 0.18em; opacity: 0.75; margin-top: 0.4cqw;
}
.cover-meta { text-align: right; font-size: 0.85cqw; letter-spacing: 0.15em; opacity: 0.7; }

/* ==========================================================
   INTRO — magazine spread with pull quote
   ========================================================== */
.slide-intro .slide-inner { padding: 0; }
.intro-shell { display: grid; grid-template-columns: 32% 1fr; width: 100%; height: 100%; }
.intro-img { background: var(--paper); position: relative; overflow: hidden; }
.intro-img img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  filter: contrast(1.05) saturate(0.9);
}
.intro-img::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(20,55,32,0.55) 0%, rgba(15,40,22,0.30) 30%, rgba(20,55,32,0.55) 100%);
}
.intro-chapter-vert {
  position: absolute; left: 2cqw; top: 2.5cqw;
  font-family: var(--font-display); font-style: italic;
  color: var(--vermillion-soft); font-size: 1.1cqw; letter-spacing: 0.3em;
  font-weight: 700; text-transform: uppercase; z-index: 2;
  display: flex; align-items: center; gap: 0.7cqw;
}
.intro-chapter-vert::before { content: ""; width: 1.8cqw; height: 1px; background: var(--vermillion); }
.intro-bignum-display {
  position: absolute; left: 1.8cqw; bottom: 1.5cqw;
  font-family: var(--font-display); font-style: italic;
  font-size: 9cqw; line-height: 0.85; font-weight: 500;
  color: rgba(255,255,255,0.18); z-index: 2;
}
.intro-content {
  padding: 4.5cqw 4.5cqw 4cqw 4cqw;
  display: flex; flex-direction: column; justify-content: center;
  position: relative;
}
.intro-shared-tag {
  position: absolute; top: 3cqw; right: 4.5cqw;
  font-size: 0.85cqw; color: var(--sub);
  padding: 0.2cqw 0.7cqw; border: 1px solid var(--hairline); border-radius: 999px;
}
.intro-eyebrow {
  font-size: 0.95cqw; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--vermillion); font-weight: 700; margin-bottom: 0.8cqw;
  display: flex; align-items: center; gap: 0.7cqw;
}
.intro-eyebrow::before { content: ""; width: 2cqw; height: 1px; background: var(--vermillion); }
.intro-content .slide-title {
  font-size: 2.9cqw; margin-bottom: 1.5cqw;
}
.intro-pullquote {
  font-family: var(--font-serif);
  font-size: 1.4cqw; font-style: italic; color: var(--green);
  line-height: 1.7; max-width: 92%;
  padding-bottom: 1.5cqw; margin-bottom: 1.5cqw;
  border-bottom: 1px solid var(--hairline);
}
.intro-details { display: flex; flex-direction: column; gap: 1.1cqw; max-width: 90%; }
.intro-detail {
  display: grid; grid-template-columns: 9cqw 1fr; gap: 1.4cqw;
  padding-bottom: 0.9cqw; border-bottom: 1px solid var(--hairline);
}
.intro-detail:last-child { border-bottom: none; }
.intro-detail-label {
  font-size: 0.85cqw; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--vermillion); font-weight: 700; padding-top: 0.3cqw;
}
.intro-detail-body { font-size: 1.15cqw; color: var(--ink); line-height: 1.55; }
.slide-intro .slide-footer { display: none; }

/* ==========================================================
   QUESTIONS — two-col with photo and MASSIVE display number
   ========================================================== */
.slide-questions .slide-inner { padding: 0; }
.questions-shell { display: grid; grid-template-columns: 40% 1fr; width: 100%; height: 100%; }
.questions-img { background: var(--paper); position: relative; overflow: hidden; }
.questions-img img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  filter: contrast(1.05) saturate(0.85) brightness(0.95);
}
.questions-img::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(15,40,22,0.55) 0%, rgba(15,35,22,0.25) 35%, rgba(15,35,22,0.6) 100%);
}
.questions-img-eyebrow {
  position: absolute; left: 2cqw; top: 2.5cqw;
  color: var(--vermillion-soft); font-size: 1cqw; letter-spacing: 0.3em;
  text-transform: uppercase; font-weight: 700; z-index: 2;
  display: flex; align-items: center; gap: 0.7cqw;
}
.questions-img-eyebrow::before { content: ""; width: 1.8cqw; height: 1px; background: var(--vermillion); }
.questions-img-bignum {
  position: absolute; left: 1.5cqw; bottom: 0.8cqw;
  font-family: var(--font-display); font-style: italic;
  font-size: 15cqw; color: rgba(255,255,255,0.16);
  line-height: 0.8; font-weight: 500; z-index: 2;
}
.questions-content {
  padding: 4.5cqw 4.5cqw 4cqw;
  display: flex; flex-direction: column; justify-content: center;
  position: relative;
}
.questions-shared-tag {
  position: absolute; top: 3cqw; right: 4.5cqw;
  font-size: 0.85cqw; color: var(--sub);
  padding: 0.2cqw 0.7cqw; border: 1px solid var(--hairline); border-radius: 999px;
}
.questions-content .slide-title {
  font-size: 2.7cqw; margin-bottom: 2cqw;
}
.questions-editorial { display: flex; flex-direction: column; gap: 1.2cqw; }
.question-item {
  display: grid; grid-template-columns: 5cqw 1fr; gap: 1.5cqw;
  align-items: baseline; padding-bottom: 1.1cqw;
  border-bottom: 1px solid var(--hairline);
}
.question-item:last-child { border-bottom: none; }
.question-mark {
  font-family: var(--font-display); font-size: 2.7cqw; font-weight: 500;
  color: var(--vermillion); font-style: italic;
}
.question-text {
  font-size: 1.35cqw; color: var(--ink); line-height: 1.55;
}
.slide-questions .slide-footer { display: none; }

/* ==========================================================
   OVERVIEW — hero + spec sheet (refined)
   ========================================================== */
.slide-overview .chapter-mark { content: "II"; }
.overview-grid {
  display: grid; grid-template-columns: 1.1fr 1fr; gap: 3cqw;
  flex: 1; align-items: stretch;
}
.overview-img {
  background: var(--paper); overflow: hidden; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.overview-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.overview-img::after {
  content: ""; position: absolute; inset: 0;
  border: 1px solid var(--hairline-dk); pointer-events: none;
}
.overview-text { display: flex; flex-direction: column; gap: 1cqw; padding-left: 0.5cqw; }
.overview-sub {
  font-family: var(--font-serif);
  font-size: 1.4cqw; color: var(--vermillion); font-style: italic;
  margin-bottom: 0.5cqw; letter-spacing: 0.03em;
}
.spec-row {
  display: grid; grid-template-columns: 12cqw 1fr;
  gap: 1cqw; padding: 0.9cqw 0;
  border-bottom: 1px dashed var(--hairline-dk);
}
.spec-row:last-of-type { border-bottom: 1px solid var(--green-dk); }
.spec-h {
  font-size: 1.05cqw; font-weight: 700; color: var(--green-dk); letter-spacing: 0.05em;
}
.spec-d { font-size: 1.0cqw; color: var(--ink-soft); line-height: 1.55; }
.overview-foot {
  font-size: 0.9cqw; color: var(--vermillion); margin-top: 0.6cqw; font-style: italic;
}

/* ==========================================================
   POSITION — content + photo right
   ========================================================== */
.slide-position .slide-inner { padding: 0; }
.position-shell { display: grid; grid-template-columns: 1fr 38%; width: 100%; height: 100%; }
.position-content {
  padding: 4.5cqw 3cqw 4cqw 4.5cqw;
  display: flex; flex-direction: column; justify-content: center;
  position: relative;
}
.position-shared-tag {
  position: absolute; top: 3cqw; right: 3cqw;
  font-size: 0.85cqw; color: var(--sub);
  padding: 0.2cqw 0.7cqw; border: 1px solid var(--hairline); border-radius: 999px;
}
.position-eyebrow {
  font-size: 0.95cqw; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--vermillion); font-weight: 700; margin-bottom: 0.8cqw;
  display: flex; align-items: center; gap: 0.7cqw;
}
.position-eyebrow::before { content: ""; width: 2cqw; height: 1px; background: var(--vermillion); }
.position-content .slide-title {
  font-size: 2.6cqw; margin-bottom: 1.5cqw;
}
.position-img { background: var(--paper); position: relative; overflow: hidden; }
.position-img img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  filter: contrast(1.05) saturate(0.92);
}
.position-img::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(220deg, rgba(15,40,22,0.45) 0%, transparent 40%, rgba(20,55,32,0.30) 100%);
}
.position-img-mark {
  position: absolute; right: 2cqw; top: 2.5cqw;
  font-family: var(--font-display); font-style: italic;
  color: rgba(255,255,255,0.85); font-size: 1.2cqw; letter-spacing: 0.2em;
  font-weight: 700; z-index: 2;
}
.position-grid { display: flex; flex-direction: column; gap: 1.3cqw; }
.position-card {
  display: grid; grid-template-columns: 3cqw 1fr; gap: 1.5cqw;
  padding: 0.9cqw 0; align-items: start;
  border-bottom: 1px solid var(--hairline);
}
.position-card:last-child { border-bottom: none; }
.position-num {
  font-family: var(--font-display); font-size: 2.4cqw; font-weight: 500;
  color: var(--vermillion); line-height: 1; padding-top: 0.2cqw; font-style: italic;
}
.position-h {
  font-family: var(--font-serif); font-size: 1.4cqw; font-weight: 600;
  color: var(--green-dk); margin-bottom: 0.3cqw;
}
.position-d { font-size: 1.05cqw; color: var(--ink); line-height: 1.6; }
.slide-position .slide-footer { display: none; }

/* ==========================================================
   USP — HERO. Mega numbers, vermillion + green panels, bold typography
   ========================================================== */
.slide-usp .slide-inner { padding: 0; display: flex; flex-direction: column; }
.usp-header {
  padding: 3.2cqw 4.5cqw 1.5cqw;
  position: relative;
}
.usp-eyebrow {
  font-size: 1cqw; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--vermillion); font-weight: 700; margin-bottom: 1cqw;
  display: flex; align-items: center; gap: 0.8cqw;
}
.usp-eyebrow::before { content: ""; width: 2.5cqw; height: 1.5px; background: var(--vermillion); }
.usp-title {
  font-family: var(--font-serif);
  font-size: 3.6cqw; font-weight: 700; color: var(--green-dk);
  line-height: 1.3; margin: 0; letter-spacing: 0.01em;
}
.usp-tag {
  position: absolute; top: 3.2cqw; right: 4.5cqw;
  font-size: 0.85cqw; color: var(--sub);
  padding: 0.2cqw 0.7cqw; border: 1px solid var(--hairline); border-radius: 999px;
}
.usp-merits {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 0; flex: 1;
  border-top: 1px solid var(--hairline-dk);
}
.merit-panel {
  padding: 2.5cqw 2.5cqw 2cqw;
  display: flex; flex-direction: column;
  position: relative;
  border-right: 1px solid var(--hairline);
}
.merit-panel:last-child { border-right: none; }
.merit-panel:nth-child(1) { background: var(--cream); }
.merit-panel:nth-child(2) { background: var(--paper); }
.merit-panel:nth-child(3) { background: var(--cream); }
.merit-num {
  font-family: var(--font-display); font-style: italic;
  font-size: 8.5cqw; font-weight: 500;
  color: var(--vermillion); line-height: 0.85;
  margin-bottom: 1.2cqw; letter-spacing: -0.02em;
  position: relative;
}
.merit-num::after {
  content: ""; position: absolute; bottom: 0.2cqw; left: 0;
  width: 4cqw; height: 2px; background: var(--vermillion);
}
.merit-h {
  font-family: var(--font-serif);
  font-size: 1.9cqw; font-weight: 700;
  color: var(--green-dk);
  margin-bottom: 0.7cqw; line-height: 1.4; letter-spacing: 0.02em;
  margin-top: auto;
}
.merit-d { font-size: 1.15cqw; color: var(--ink); line-height: 1.7; }
.merit-bar {
  padding: 1.5cqw 4.5cqw;
  background: var(--green-dk); color: var(--cream);
  font-family: var(--font-serif);
  text-align: center; font-size: 1.4cqw; font-weight: 600;
  letter-spacing: 0.05em;
  position: relative;
}
.merit-bar::before {
  content: "—"; margin-right: 1.2cqw; color: var(--vermillion-soft); font-weight: 400;
}
.merit-bar::after {
  content: "—"; margin-left: 1.2cqw; color: var(--vermillion-soft); font-weight: 400;
}

/* ==========================================================
   BASIC — numbered process with chapter mark
   ========================================================== */
.slide-basic .chapter-mark {
  font-family: var(--font-display); font-style: italic;
  font-size: 8cqw; color: var(--vermillion); opacity: 0.12;
}
.basic-grid {
  display: flex; flex-direction: column; gap: 1.5cqw; flex: 1;
  justify-content: center; padding-top: 0.5cqw;
  position: relative; z-index: 1;
}
.basic-card {
  display: grid; grid-template-columns: 3.5cqw 1fr; gap: 1.5cqw;
  padding: 1.2cqw 1.5cqw; align-items: start;
  border-left: 3px solid var(--vermillion);
  background: rgba(245, 241, 232, 0.4);
}
.basic-marker {
  font-family: var(--font-display); font-weight: 500; font-style: italic;
  font-size: 2.2cqw; color: var(--vermillion); line-height: 1;
}
.basic-h {
  font-family: var(--font-serif); font-size: 1.5cqw; font-weight: 600;
  color: var(--green-dk); margin-bottom: 0.3cqw;
}
.basic-d { font-size: 1.1cqw; color: var(--ink); line-height: 1.6; }

/* ==========================================================
   ACHIEVEMENT — full-bleed photo with overlay text
   ========================================================== */
.slide-achievement .slide-inner { padding: 0; }
.achievement-fullbleed { position: relative; width: 100%; height: 100%; }
.achievement-fullbleed img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  filter: contrast(1.05);
}
.achievement-fullbleed::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(105deg, rgba(10,30,18,0.78) 0%, rgba(15,40,22,0.55) 45%, transparent 100%);
}
.achievement-overlay {
  position: absolute; inset: 0;
  padding: 4.5cqw 5cqw 4cqw;
  display: flex; flex-direction: column; justify-content: center;
  color: var(--cream); z-index: 1;
  max-width: 55%;
}
.achievement-eyebrow {
  font-size: 1cqw; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--vermillion-soft); font-weight: 700; margin-bottom: 1cqw;
  display: flex; align-items: center; gap: 0.8cqw;
}
.achievement-eyebrow::before { content: ""; width: 2.5cqw; height: 1.5px; background: var(--vermillion); }
.ach-tagline {
  font-family: var(--font-display); font-style: italic;
  font-size: 1.4cqw; color: var(--vermillion-soft);
  margin-bottom: 0.8cqw; letter-spacing: 0.03em;
}
.achievement-title {
  font-family: var(--font-serif);
  font-size: 3.2cqw; font-weight: 700; color: var(--cream);
  line-height: 1.35; margin: 0 0 1.5cqw;
}

<script>const SCRIPTS_DATA = {"municipal": {"intro": "本日はお時間をいただき、誠にありがとうございます。\n Reegle株式会社の〇〇と申します。どうぞよろしくお願いいたします。\n\n弊社は、木材を公共空間や地域施設の中で、より実用的かつ意味のある形で活用することをテーマに、木製ユニットの企画・開発を行っている会社です。\n\n本日は、御自治体での平時利用と災害時利用の両立という観点から、「こういう使い方ができそうだな」とイメージしていただける内容を中心にお話しできればと思っています。\n 気になる点がございましたら何でもご質問ください。", "icebreak": "〇〇様、最初に1点お伺いしてもよろしいでしょうか？\n 先日は突然のお電話にも関わらず、ご興味をいただけた理由を先にお伺いしてもよろしいでしょうか？\n\nありがとうございます。そういった背景からご興味をお持ちいただいたんですね。\n\n差し支えなければ、御自治体では避難所運営や地域施設の備品について、見直しや検討が発生するタイミングはどのような場面が多いでしょうか。\n\nなるほど、そういった状況なのですね。\n\nもう一点だけ、避難所における子ども向けスペースの確保について、現在何か取り組まれていることはございますか。\n\nありがとうございます。\n 今のお話を伺って、今日ご紹介する内容は、きっとお役に立てる部分が多いと感じました。", "overview": "本日ご紹介したいのが、弊社で開発している木製ユニット「ジラフ」です。\n\n用途に応じてサイズが2種類あり、避難所での間仕切り用途を想定した大きいサイズと、子ども向けスペースに適したキッズサイズがあります。\n どちらも工具を使わず、パーツを差し込むだけで組み立てられる構造になっており、専門業者を呼ばずに職員の方だけで設営できます。\n\nまた、ジラフは **L型とI型の2種類のパーツで構成されている**ため、シンプルな構造で扱いやすく、壁に掛けて保管することで内装材のように見せることもできます。\n\n「普段は使わない防災備品」ではなく、日常の中で使いながら備えるという考え方を形にしたプロダクトです。", "position": "最近は、避難所対策を「非常時の備え」だけで完結させるのではなく、平時から使える備品をいざという時に転用するという考え方が広がっています。\n\n特に、子供家庭庁からも「避難所での子供スペース確保」が示されている中で、キッズサイズのように普段は地域施設で使えて、災害時にそのまま活用できる備品は、運用面でも無理が出にくいと感じています。\n\nまた、木製という点から木材利用促進や環境配慮の文脈とも相性が良く、環境関連予算や環境譲与税の対象として検討しやすいケースもあるため、「防災」と「環境施策」を分けずに考えられる点も特徴です。", "usp": "御社にメリットがあるポイントを3つにまとめますね。\n\n一つ目は、使い道を一つに限定しない点です。\n 平時は地域施設や公共施設の空間づくりに使いながら、災害時には避難所の間仕切りや子どもスペースに転用できます。\n\n二つ目は、設営のしやすさです。\n 工具が不要で、専門知識がなくても短時間で組み立てができるため、職員の方の負担を増やさずに運用できます。\n\n最後に、木製ならではの安心感です。\n 視覚的にも柔らかく、特に子どもが過ごす空間でも、威圧感を与えにくい点は評価いただいています。", "basic": "弊社では、木製ユニットそのもののご提供に加えて、御自治体の施設構成や想定シーンを伺いながら、どのような配置や使い方が現実的かを一緒に整理するところまでサポートしています。\n\nいきなり導入を前提にするのではなく、「こういう場面なら使えそうか」「ここは難しそうか」といった整理の段階からお話しできればと考えています。", "achievement": "自治体様への本格導入はこれからの段階ではありますが、教育機関と連携した空間づくりの検討や、公共性の高い施設を想定した活用検証などを進めてきています。\n\nその中で、特に「子どもが安心して過ごせる空間づくり」という観点では、具体的な評価やフィードバックもいただいています。", "hearing": "すいません、ここまで一方的にお話ししてしまいました。ここからは御社の現状や、今日お聞きいただいた内容の中で「ここが気になる」「少し深掘りしたい」と感じられた部分を伺えればと思っています。\n ありがとうございます。\n\n## **先方の取り組み・課題について**\n\nでは、現在の体制で特に改善したい点や課題 があるポイントを3つにまとめますね。\n\n一つ目は、設計負荷の軽減です。\n 規格化されたフレームをベースにするため、ゼロから構造を組む必要がなく、非住宅案件でもスムーズに着手できます。\n\n二つ目は、短工期・ローコストです。\n 部材が標準化されているため、材料手配や施工の段取りが組みやすく、結果として工期短縮やコスト抑制につながります。\n\n最後に、用途の幅広さです。\n 倉庫・作業場・店舗・ガレージなど、用途を限定せずに提案できるため、御社の商談機会を広げるきっかけにもなります。\n\n# **【基本サービス】**\n\n弊社では、コレモクのフレーム提供に加えて、御社の案件内容を伺いながら、どの規格が適しているか、どのような構成が現実的かを一緒に整理するところまでサポートしています。\n\nいきなり導入を前提にするのではなく、「こういう案件なら使えそうか」「ここは難しそうか」といった整理の段階からお話しできればと考えています。\n\n# **【実績紹介】**\n\n本格導入はこれからの段階ではありますが、施工会社様からの相談や、非住宅木造の検討案件において、「鉄骨ほど大げさにしたくない」「プレハブより意匠性を出したい」といった声をいただいています。\n\nその中で、特に「小規模建築の選択肢が増える」という点で、具体的な評価やフィードバックもいただいています。\n\n# **【ヒアリング（提案）】**\n\nすいません、ここまで一方的にお話ししてしまいました。ここからは御社の現状や、今日お聞きいただいた内容の中で「ここが気になる」「少し深掘りしたい」と感じられた部分を伺えればと思っています。\n ありがとうございます。\n\n## **先方の取り組み・課題について**\n\nでは、現在の体制で特に改善したい点や課題を感じていらっしゃる部分をお聞かせください。\n\n非住宅木造の案件で、構造やコスト面で課題を感じる場面はありますか。\n\n小規模建築の相談があった際、提案の幅に制約を感じることはありますか。\n\n工期や材料手配で、改善したい点はありますか。\n\n御社の得意分野と、今後広げたい領域があれば教えてください。\n\n## **BANT情報の確認**\n\n実現可能な進め方を設計するため、差し支えない範囲で確認させてください。\n\n今回のような建築フレーム導入について、最終的な判断はどなたが中心になることが多いでしょうか。\n\n導入を検討される場合、時期としてはどれくらいを想定されていますか。\n\n対象となる案件の規模感や用途はどれくらいでしょうか。\n\n検討を進める際に、設計部門や他部署との調整が必要になるケースはありますか。\n\n# **【想定される先方からの質疑＆その応答】**\n\nQ1：どんな用途に使えますか。\n A1：倉庫・作業場・店舗・ガレージ・小規模事務所など、幅広い用途に対応できます。規格化されたフレームなので、用途に合わせて柔軟にご提案できます。\n\nQ2：構造の強度は問題ありませんか。\n A2：必要な強度を確保したうえで規格化しているため、一般的な小規模非住宅用途であれば問題なく対応できます。\n\nQ3：設計の自由度はどれくらいありますか。\n A3：規格フレームをベースにしつつ、間取りや外観は案件に合わせて調整できます。完全自由設計より負荷を抑えながら、一定の自由度を確保できます。\n\nQ4：工期はどれくらい短縮できますか。\n A4：部材が標準化されているため、材料手配や施工の段取りが組みやすく、結果として短工期につながります。\n\nQ5：木材の劣化は心配ありませんか。\n A5：屋内・屋根下での使用を前提にしているため、一般的な木造建築と同様の扱いになります。木材特有の細かな割れが入る可能性はありますが、構造上の問題にはなりません。\n\nQ6：金物固定の仕様にはできますか。\n A6：金物固定については、過去に検討したことがあります。安全性や耐久性が上がる一方で、部材点数が増えてコストが上がることや、コンセプトを崩してしまうため、現在の提供仕様としては採用していません。ただ、検討の背景については丁寧にご説明できます。\n\nQ7：対応エリアはどこまでですか。\n A7：地域によって材料供給の条件が異なるため、まずは案件の場所を伺いながら、対応可否を確認させていただいています。\n\nQ8：価格はいくらぐらいになりますか。\n A8：規模や用途によって大きく変わるため、まずは案件の条件を伺ったうえで、次回の商談時に具体的な構成案とあわせてお見積りをご用意できます。\n\n# **【クロージング】**\n\nありがとうございます。\n もしよろしければ、まずは     inner.innerHTML = `
      <div class="intro-shell">
        <div class="intro-img">
          ${img ? `<img src="${img}" alt="">` : ''}
          <div class="intro-chapter-vert">${esc(chapter)} ／ ${esc(slide.eyebrow || '')}</div>
          <div class="intro-bignum-display">${esc(chapter)}</div>
        </div>
        <div class="intro-content">
          ${slide._shared ? '<div class="intro-shared-tag">共通</div>' : ''}
          <div class="intro-eyebrow">${esc(slide.eyebrow || '')}</div>
          <h2 class="slide-title">${nl2br(esc(slide.title || ''))}</h2>
          <div class="intro-pullquote">"${esc(pullquote)}"</div>
          <div class="intro-details">
            ${bullets.map(b => `
              <div class="intro-detail">
                <div class="intro-detail-label">${esc(b.h)}</div>
                <div class="intro-detail-body">${esc(b.d)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }
  else if (kind === 'questions') {
    const img = imgFor(slide._section) || resolveImage('img:parts');
    const bigNum = chapter;
    inner.innerHTML = `
      <div class="questions-shell">
        <div class="questions-img">
          ${img ? `<img src="${img}" alt="">` : ''}
          <div class="questions-img-eyebrow">${esc(chapter)} ／ ${esc(slide.eyebrow || '')}</div>
          <div class="questions-img-bignum">${bigNum}</div>
        </div>
        <div class="questions-content">
          ${slide._shared ? '<div class="questions-shared-tag">共通</div>' : ''}
          <h2 class="slide-title">${nl2br(esc(slide.title || ''))}</h2>
          <div class="questions-editorial">
            ${(slide.questions || []).map((q, i) => `
              <div class="question-item">
                <span class="question-mark">${String(i + 1).padStart(2, '0')}.</span>
                <span class="question-text">${esc(q)}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }
  else if (kind === 'overview') {
    const img = resolveImage(slide.image);
    inner.innerHTML = `
      <div class="chapter-mark">${esc(chapter)}</div>
      ${headerHTML(slide)}
      <div class="overview-grid">
        <div class="overview-img">${img ? `<img src="${img}" alt="">` : ''}</div>
        <div class="overview-text">
          <div class="overview-sub">${esc(slide.subtitle || '')}</div>
          ${(slide.bullets || []).map(b => `
            <div class="spec-row">
              <div class="spec-h">${esc(b.h)}</div>
              <div class="spec-d">${esc(b.d)}</div>
            </div>
          `).join('')}
          ${slide.footnote ? `<div class="overview-foot">— ${esc(slide.footnote)}</div>` : ''}
        </div>
      </div>
    `;
  }
  else if (kind === 'position') {
    const img = resolveImage('img:hero_usage') || resolveImage('img:usage_scene');
    inner.innerHTML = `
      <div class="position-shell">
        <div class="position-content">
          ${slide._shared ? '<div class="position-shared-tag">共通</div>' : ''}
          <div class="position-eyebrow">${esc(slide.eyebrow || '')}</div>
          <h2 class="slide-title">${nl2br(esc(slide.title || ''))}</h2>
          <div class="position-grid">
            ${(slide.bullets || []).map((b, i) => `
              <div class="position-card">
                <div class="position-num">${String(i + 1).padStart(2, '0')}</div>
                <div class="position-body">
                  <div class="position-h">${esc(b.h)}</div>
                  ${b.d ? `<div class="position-d">${esc(b.d)}</div>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="position-img">
          ${img ? `<img src="${img}" alt="">` : ''}
          <div class="position-img-mark">${esc(chapter)}</div>
        </div>
      </div>
    `;
  }
  else if (kind === 'usp') {
    inner.innerHTML = `
      <div class="usp-header">
        ${slide._shared ? '<div class="usp-tag">共通</div>' : ''}
        <div class="usp-eyebrow">${esc(slide.eyebrow || '')}</div>
        <h2 class="usp-title">${nl2br(esc(slide.title || ''))}</h2>
      </div>
      <div class="usp-merits">
        ${(slide.merits || []).map(m => `
          <div class="merit-panel">
            <div class="merit-num">${esc(m.n)}</div>
            <div class="merit-h">${esc(m.h)}</div>
            <div class="merit-d">${esc(m.d)}</div>
          </div>
        `).join('')}
      </div>
      <div class="merit-bar">${esc(slide.bar)}</div>
    `;
  }
  else if (kind === 'basic') {
    inner.innerHTML = `
      <div class="chapter-mark">${esc(chapter)}</div>
      ${headerHTML(slide)}
      <div class="basic-grid">
        ${(slide.bullets || []).map((b, i) => `
          <div class="basic-card">
            <div class="basic-marker">${String(i + 1).padStart(2, '0')}</div>
            <div>
              <div class="basic-h">${esc(b.h)}</div>
              <div class="basic-d">${esc(b.d)}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }
  else if (kind === 'achievement') {
    const img = resolveImage(slide.image) || resolveImage('img:hero_usage');
    inner.innerHTML = `
      <div class="achievement-fullbleed">
        ${img ? `<img src="${img}" alt="">` : ''}
        <div class="achievement-overlay">
          <div class="achievement-eyebrow">${esc(chapter)} ／ ${esc(slide.eyebrow || '')}</div>
          <div class="ach-tagline">"Crafted spaces, considered details."</div>
          <h2 class="achievement-title">${nl2br(esc(slide.title || ''))}</h2>
          <div class="ach-list">
            ${(slide.bullets || []).map(b => `
              <div class="ach-row">
                <div>
                  <div class="ach-h">${esc(b.h)}</div>
                  ${b.d ? `<div class="ach-d">${esc(b.d)}</div>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
          ${slide.footnote ? `<div class="ach-foot">※ ${esc(slide.footnote)}</div>` : ''}
        </div>
      </div>
    `;
  }
  else if (kind === 'qa') {
    inner.innerHTML = `
      <div class="chapter-mark">${esc(chapter)}</div>
      ${headerHTML(slide)}
      <div class="qa-grid">
        ${(slide.items || []).map(it => `
          <div class="qa-card">
            <div class="qa-q">${esc(it.q)}</div>
            <div class="qa-a">${esc(it.a)}</div>
          </div>
        `).join('')}
      </div>
    `;
  }
  else if (kind === 'closing') {
    const bullets = slide.bullets || [];
    inner.innerHTML = `
      <div class="closing-statement-panel">
        ${slide._shared ? '<div class="closing-shared-tag">共通</div>' : ''}
        <div class="closing-eyebrow">${esc(chapter)} ／ ${esc(slide.eyebrow || '')}</div>
        <h2 class="closing-title-big">${nl2br(esc(slide.title || ''))}</h2>
        <div class="closing-statement">御社の体制やご要望を伺いながら、施設・用途に合わせた最適プランを具体化させていただきます。</div>
      </div>
      <div class="closing-cards">
        ${bullets.map((b, i) => `
          <div class="closing-card">
            <div class="closing-card-num">${String(i + 1).padStart(2, '0')}</div>
            <div class="closing-card-h">${esc(b.h)}</div>
            <div class="closing-card-d">${esc(b.d)}</div>
          </div>
        `).join('')}
      </div>
    `;
  }
  else if (kind === 'simple') {
    inner.innerHTML = `
      <div class="chapter-mark">${esc(chapter)}</div>
      ${headerHTML(slide)}
      <div class="simple-body">${esc(slide.body)}</div>
    `;
  }
  else if (kind === 'rebuttal') {
    const tagLabels = ['CASE I', 'CASE II', 'CASE III'];
    inner.innerHTML = `
      <div class="rebuttal-header-panel">
        ${slide._shared ? '<div class="rebuttal-shared-tag">共通</div>' : ''}
        <div class="rebuttal-eyebrow">${esc(chapter)} ／ ${esc(slide.eyebrow || '')}</div>
        <h2 class="rebuttal-title-big">${nl2br(esc(slide.title || ''))}</h2>
      </div>
      <div class="rebuttal-grid">
        ${(slide.cases || []).map((c, i) => `
          <div class="rebuttal-card">
            <div class="rebuttal-tag">${tagLabels[i] || ''}</div>
            <div class="rebuttal-h">${esc(c.h)}</div>
            <div class="rebuttal-d">${esc(c.d)}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  if (kind !== 'cover' && kind !== 'intro' && kind !== 'questions' && kind !== 'position' && kind !== 'achievement') {
    const footer = document.createElement('div');
    footer.className = 'slide-footer';
    const typeLabel = opts.typeLabel || '';
    const pageInfo = opts.pageInfo || '';
    footer.innerHTML = `
      <div class="footer-left">REEGLE ${typeLabel ? '／ ' + esc(typeLabel) : ''}</div>
      <div class="footer-right">${esc(pageInfo)}</div>
    `;
    inner.appendChild(footer);
  }

  container.appendChild(inner);
}

function headerHTML(slide) {
  return `
    <div class="slide-header">
      <div class="slide-eyebrow">${esc(slide.eyebrow || '')}</div>
      ${slide._shared ? '<div class="shared-tag">共通</div>' : ''}
    </div>
    <h2 class="slide-title">${nl2br(esc(slide.title || ''))}</h2>
  `;
}
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function nl2br(s) { return s.replace(/\n/g, '<br>'); }
</script>

<script>
// ===== Presenter state =====
const state = {
  type: 'municipal',
  index: 0,
};

// ===== BroadcastChannel setup =====
let bc = null;
let audienceConnected = false;
try {
  bc = new BroadcastChannel('reegle-present');
  bc.onmessage = ev => {
    if (!ev.data) return;
    if (ev.data.kind === 'hello') {
      // Audience tab announced itself — respond with current state and mark connected
      audienceConnected = true;
      updateSyncStatus();
      sendState('hello-back');
    } else if (ev.data.kind === 'nav') {
      navigate(ev.data.dir);
    }
  };
} catch {}

function sendState(kind = 'state') {
  if (!bc) return;
  bc.postMessage({ kind, state: { type: state.type, index: state.index } });
}
function updateSyncStatus() {
  const el = document.getElementById('syncStatus');
  if (audienceConnected) {
    el.textContent = '投影画面：接続中';
    el.classList.add('live');
  } else {
    el.textContent = '投影画面：未接続';
    el.classList.remove('live');
  }
}

// ===== Type switcher =====
function renderTypeSwitcher() {
  const host = document.getElementById('typeSwitcher');
  host.innerHTML = '';
  Object.keys(TYPE_META).forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'type-btn' + (t === state.type ? ' active' : '');
    btn.textContent = TYPE_META[t].label;
    btn.onclick = () => switchType(t);
    host.appendChild(btn);
  });
}
function switchType(t) {
  state.type = t;
  state.index = 0;
  renderTypeSwitcher();
  renderScriptList();
  paintPreview();
  scrollActiveIntoView();
  sendState();
}

// ===== Script formatting =====
function formatScript(raw) {
  if (!raw) return '';
  // Convert markdown-ish patterns to HTML
  // 1. Sub-headings (## **Q1：...**)
  let s = raw.replace(/^##\s*\*\*(.+?)\*\*\s*$/gm, '<div class="sub-h">$1</div>');
  // 2. Bold (**xxx**)
  s = s.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
  // 3. Bullet lines starting with "- "
  s = s.replace(/^- (.+)$/gm, '・$1');
  // 4. Paragraphs (split by blank line)
  const paragraphs = s.split(/\n\n+/).map(p => {
    if (p.includes('class="sub-h"')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  });
  return paragraphs.join('');
}

// ===== Script list =====
function renderScriptList() {
  const pane = document.getElementById('scriptPane');
  pane.innerHTML = '';
  const slides = SLIDES_DATA[state.type] || [];
  const scripts = SCRIPTS_DATA[state.type] || {};
  slides.forEach((slide, i) => {
    const block = document.createElement('div');
    const internalClass = slide._internal ? ' internal' : '';
    block.className = 'script-block' + (i === state.index ? ' active' : '') + internalClass;
    block.dataset.idx = i;
    const sec = slide._section;
    const sectionLabel = SECTION_LABELS[sec] || sec;
    const scriptText = scripts[sec] || '';
    const shared = slide._shared ? '<span class="script-shared-tag">共通</span>' : '';
    const internalTag = slide._internal ? '<span class="script-internal-tag">🔒 内部資料 ／ 投影されません</span>' : '';
    const header = `
      <div>
        <span class="script-num">${String(i+1).padStart(2,'0')}</span>
        <span class="script-section-tag">${escHtml(sectionLabel)}</span>
        ${shared}${internalTag}
      </div>
    `;
    const body = scriptText ? `<div class="script-body">${formatScript(scriptText)}</div>` : '';
    block.innerHTML = header + body;
    block.onclick = () => {
      state.index = i;
      markActive();
      paintPreview();
      // INTERNAL: do not push state to audience — they stay on the last visible slide
      if (!slide._internal) sendState();
    };
    pane.appendChild(block);
  });
}
function markActive() {
  document.querySelectorAll('.script-block').forEach((b, i) => {
    b.classList.toggle('active', i === state.index);
  });
}
function scrollActiveIntoView() {
  const active = document.querySelector('.script-block.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ===== Preview =====
function paintPreview() {
  const slides = SLIDES_DATA[state.type] || [];
  const slide = slides[state.index];
  const host = document.getElementById('previewSlide');
  const typeLabel = TYPE_META[state.type] ? TYPE_META[state.type].label : '';
  const coverEyebrow = TYPE_META[state.type] ? TYPE_META[state.type].coverEyebrow : '';

  if (slide && slide._internal) {
    // Internal slide: render the placeholder, no actual slide
    host.innerHTML = `
      <div class="preview-internal-placeholder">
        <div class="lock-icon">🔒</div>
        <div class="internal-h">内部資料 ／ 投影されません</div>
        <div class="internal-d">このセクションは営業側のカンペとして台本を残してあります。<br>投影画面（先方の画面）には表示されません。</div>
      </div>
    `;
    document.getElementById('metaSection').textContent = (SECTION_LABELS[slide._section] || '') + ' （内部資料）';
    document.getElementById('metaPage').textContent = `${state.index + 1} / ${slides.length}`;
    document.getElementById('navCounter').textContent = `${state.index + 1} / ${slides.length}`;
    document.getElementById('btnPrev').disabled = state.index === 0;
    document.getElementById('btnNext').disabled = state.index === slides.length - 1;
    return;
  }

  // Page count: exclude cover AND internal slides
  const visibleSlides = slides.filter(s => s.kind !== 'cover' && !s._internal);
  const visibleIndex = visibleSlides.indexOf(slide);
  const pageInfo = slide && slide.kind !== 'cover' ? `${visibleIndex + 1} / ${visibleSlides.length}` : '';
  renderSlide(host, slide, { typeLabel, pageInfo, coverEyebrow });
  document.getElementById('metaSection').textContent = SECTION_LABELS[slide._section] || '';
  document.getElementById('metaPage').textContent = `${state.index + 1} / ${slides.length}`;
  document.getElementById('navCounter').textContent = `${state.index + 1} / ${slides.length}`;
  document.getElementById('btnPrev').disabled = state.index === 0;
  document.getElementById('btnNext').disabled = state.index === slides.length - 1;
}

// ===== Navigation =====
function navigate(dir) {
  const slides = SLIDES_DATA[state.type] || [];
  const next = state.index + dir;
  if (next < 0 || next >= slides.length) return;
  state.index = next;
  const slide = slides[state.index];
  markActive();
  paintPreview();
  scrollActiveIntoView();
  // INTERNAL guard: don't push state to audience when on internal
  if (!slide._internal) sendState();
}

// ===== Wiring =====
document.getElementById('btnPrev').onclick = () => navigate(-1);
document.getElementById('btnNext').onclick = () => navigate(1);
document.getElementById('btnProjector').onclick = () => {
  // Open audience view in a new tab; user then shares THAT tab in Zoom
  const win = window.open('index.html', 'reegle-audience');
  if (!win) {
    alert('ポップアップがブロックされました。ブラウザの設定で許可してください。');
    return;
  }
  // Optimistic: mark as soon-to-connect
  setTimeout(() => { sendState(); }, 700);
};
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight') { navigate(1); e.preventDefault(); }
  else if (e.key === 'ArrowLeft') { navigate(-1); e.preventDefault(); }
});

function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ===== Init =====
renderTypeSwitcher();
renderScriptList();
paintPreview();
updateSyncStatus();
</script>
</body>
</html>
